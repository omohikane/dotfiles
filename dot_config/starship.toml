# ===== Core =====
add_newline = false
scan_timeout = 30
command_timeout = 500
palette = "catppuccin_mocha"

format = """
$os$container$sudo$username$hostname$shlvl$directory$git_branch$git_state$git_status$docker_context$kubernetes$package$nodejs$python$rust$golang$terraform$aws$gcloud$jobs $cmd_duration$status$battery$memory_usage$time
$character
"""
right_format = ""

[fill]
disabled = true

# ===== Who / Where =====
[os]
disabled = true
format = "[$symbol ](subtext1)"
symbols = { Linux = "ΎΝγ", Macos = "ΎΖ╣", Windows = "≤░Ξ▓", Unknown = "ΎΕρ" }

[username]
show_always = false
style_user = "subtext1"
style_root = "bold red"
format = "[$user]($style)"

[hostname]
ssh_only = true
format = "@[$hostname](subtext0) "
disabled = false

# ===== Directory =====
[directory]
style = "bold lavender"
format = "[$path ]($style)"
truncation_length = 3
truncation_symbol = "έΑο/"
truncate_to_repo = true
read_only = " ΌΓλ"
substitutions = { "~" = "ΎΑΧ ~" }

# ===== Prompt symbol =====
[character]
success_symbol = "[έηε](bold teal)"
error_symbol   = "[έεΩ](bold red)"
vimcmd_symbol  = "[έζχ](peach)"

# ===== Git =====
[git_branch]
symbol = "ΏθΝ▒"
style = "bold peach"
format = " [ $symbol $branch ]($style)"

[git_status]
style = "green"
format = " [$all_status]($style)"
conflicted = "ΏθΦΑ"
ahead = "${count}"
diverged = "ΏθΦΕ${ahead_count}έΠς${behind_count}"
behind = "έΠς${count}"
untracked = "έζΥ"
stashed = "ΏθΥο"
modified = "έεΠΎ╕Π"
staged = "έεΦΎ╕Π"
renamed = "έηκΎ╕Π"
deleted = "ΏθΩΣΎ╕Π"

[git_state]
format = " ([$state( $progress_current/$progress_total)]($style))"
style = "bold yellow"

# ===== Containers / Cloud =====
[docker_context]
format = " [ΏθΡ│ $context](sapphire)"
only_with_files = true

[kubernetes]
format = " [έΟΙ $context(::$namespace)](sky)"
disabled = false

[aws]
format = " [AWS:$profile](yellow)"
expiration_symbol = "έΠ│"
disabled = true

[gcloud]
format = " [GCP:$account](yellow)"
disabled = true

# ===== Runtimes / Package =====
[package]
format = " [ΏθΥο $version](subtext1)"
disabled = false

[nodejs]
format = " [έυλ $version](bold green)"
detect_extensions = ["js","ts","mjs","cjs","jsx","tsx"]
detect_files = ["package.json","pnpm-lock.yaml","yarn.lock"]

[python]
symbol = "ΏθΡΞ "
format = " [${symbol}${version}](bold blue)"
detect_extensions = ["py"]
detect_files = ["pyproject.toml","requirements.txt","Pipfile"]

[rust]
format = " [ΏθοΑ $version](bold red)"

[golang]
format = " [ΏθΠΟ $version](bold cyan)"
detect_files = ["go.mod","go.sum","go.work","*.go"]

[terraform]
format = " [tf:$version](mauve)"
disabled = true

# ===== Time / Duration / Memory / Battery / Sudo / Status / Jobs =====
[time]
disabled = false
format = "[ ΎΑΩ $time ](subtext1)"
time_format = "%Y-%m-%d %H:%M"

[cmd_duration]
min_time = 500
format = " [έΠ▒ $duration](overlay2)"

[memory_usage]
disabled = false
threshold = -1
format = " [Ό┐Ζ $ram_pct]($style)"
style = "overlay1"

[battery]
full_symbol = "≤░Β╣ "
charging_symbol = "≤░ΓΕ "
discharging_symbol = "≤░ΓΔ "
format = " [$symbol$percentage]($style)"
[[battery.display]]
threshold = 30
style = "bold red"
[[battery.display]]
threshold = 100
style = "subtext1"

[sudo]
disabled = false
allow_windows = false
symbol = "≤░Α╢"
style = "bold yellow"
format = "[$symbol SUDO]($style) "

[status]
disabled = false
symbol = "έεα"
success_symbol = ""
format = "[$symbol $status]($style) "
style = "bold red"
pipestatus = true
map_symbol = true
recognize_signal_code = true

[jobs]
symbol = "έεο"
number_threshold = 1
format = " [$symbol$number]($style)"

[shlvl]
disabled = false
symbol = "έΗΧΎ╕Π "
style = "bold yellow"
format = "[$symbol]($style)"
threshold = 2

# ===== Shell indicator =====
[shell]
disabled = false
style = "bold"
bash_indicator = "[bsh](#a593e0)"
zsh_indicator  = "[zsh](#fff1b9)"
fish_indicator = "≤░Ι║ "
powershell_indicator = "[psh](#f7aa97)"
cmd_indicator  = "[cmd](#a3daff)"

# ===== Palette (Catppuccin Mocha) =====
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
