# ===== Core =====
add_newline = false
scan_timeout = 30
command_timeout = 500
palette = "catppuccin_mocha"

format = """
╭ $os$container$sudo$username$hostname$shlvl$directory$git_branch$git_commit$git_state$git_status$docker_context$kubernetes$helm$terraform$pulumi$aws$gcloud$azure$nix_shell$direnv$mise$pixi$package$nodejs$python$rust$golang$bun$deno$lua$c$cmake$ruby$java$gradle$kotlin$scala$dart$dotnet$elixir$erlang$haskell$julia$nim$perl$crystal$swift$zig$buf$opa$jobs $cmd_duration$status$battery$memory_usage$time
╰─$character
"""
right_format = ""

[fill]
disabled = true

# ===== Who / Where =====
[os]
disabled = true
format = "[$symbol]($style) "
symbols = { Linux = "", Macos = "", Windows = "󰍲", Unknown = "" }

[username]
show_always = true
style_user = "subtext1"
style_root = "bold red"
format = "[$user]($style)"

[hostname]
ssh_only = true
format = "@[$hostname](subtext0) "
disabled = false

# ===== Directory =====
[directory]
style = "bold sky"
format = " [󰉋 $path]($style) "
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo = true
read_only = " 󰌾"
substitutions = { "~" = " ~" }

# ===== Prompt symbol =====
[character]
success_symbol = "[❯](bold teal)"
error_symbol   = "[✘](bold red)"
vimcmd_symbol  = "[❮](peach)"

# ===== Git =====
[git_branch]
symbol = "󰊢 "
style = "bold peach"
format = "[ $symbol$branch ]($style)"

[git_commit]
commit_hash_length = 7
style = "bold subtext1"
format = "[($hash) ]($style)"
only_detached = true 

[git_status]
style = "green"
format = "([$all_status]($style))"
conflicted = "󰳦 "
ahead = "󰶣 "
diverged = "󰹹 "
behind = "󰶡 "
untracked = "󰇘 "
stashed = "󰏗 "
modified = "󰏫 "
staged = "󰐖 "
renamed = "󰁔 "
deleted = "󰗨 "

[git_state]
format = " ([$state( $progress_current/$progress_total)]($style))"
style = "bold yellow"

# ===== Infrastructure / Cloud (Production Standard) =====
[docker_context]
format = " [󰡨 $context](sapphire)"
only_with_files = true

[kubernetes]
format = " [󱃾 $context(::$namespace)](sky)"
disabled = false

[helm]
format = " [󱟙 $version](white bold)"

[terraform]
format = " [󱁢 $version](mauve)"

[pulumi]
format = " [󱓞 $stack](bold blue)"

[aws]
format = " [󰸏 $profile](yellow)"

[gcloud]
format = " [󱇳 $account](yellow)"
disabled = true

[azure]
format = " [󰠅 $subscription](bold blue)"

# ===== Environments & Managers =====
[nix_shell]
symbol = "󱄅 "
format = ' [$symbol$state( ($name))](blue bold)'

[direnv]
symbol = "󱁐 "
format = " [$symbol$allowed](bold yellow)"

[mise]
symbol = "󱗼 "
format = " [$symbol$version](bold text)"

[pixi]
symbol = "󱗪 "
format = " [$symbol$version](bold yellow)"

# ===== Runtimes / Programming Languages (Full Set) =====
[package]
format = " [󰏗 $version](subtext1)"

[nodejs]
format = " [󰎙 $version](bold green)"

[python]
symbol = "󰌠 "
format = " [${symbol}${version}](bold blue)"

[rust]
format = " [󱘗 $version](bold red)"

[golang]
format = " [󰟓 $version](bold cyan)"

[bun]
format = " [󰛦 $version](bold rosewater)"

[deno]
format = " [󰻊 $version](bold text)"

[lua]
format = " [󰢱 $version](bold blue)"

[c]
format = " [󰙨 $version](bold blue)"

[cmake]
format = " [󱁤 $version](bold blue)"

[java]
format = " [󰬷 $version](bold red)"

[gradle]
format = " [󱖎 $version](bold blue)"


[kotlin]
format = " [󱈙 $version](bold blue)"

[scala]
format = " [󱗚 $version](bold red)"

[dart]
format = " [󰊗 $version](bold blue)"

[dotnet]
format = " [󰪮 $version](bold blue)"

[elixir]
format = " [󰈹 $version](bold mauve)"

[erlang]
format = " [󰈹 $version](bold red)"

[haskell]
format = " [󰲒 $version](bold mauve)"

[julia]
format = " [󰟔 $version](bold mauve)"

[nim]
format = " [󰆦 $version](bold yellow)"

[perl]
format = " [󰇱 $version](bold blue)"

[crystal]
format = " [󰟴 $version](bold red)"

[swift]
format = " [󰛥 $version](bold orange)"

[zig]
format = " [󱕷 $version](bold yellow)"

# ===== Tools =====
[buf]
format = " [󰚼 $version](bold blue)"

[opa]
format = " [󰩠 $version](bold blue)"

# ===== Metrics / Status (Contextual Info) =====
[time]
disabled = false
format = "[󱑊 $time](overlay1)"
time_format = "%H:%M"

[cmd_duration]
min_time = 500
format = " [󱎫 $duration](overlay1)"

[memory_usage]
disabled = false
threshold = -1
format = " [󰍛 $ram_pct](overlay1)"

[battery]
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
format = " [$symbol$percentage](overlay1)"
[[battery.display]]
threshold = 30
style = "bold red"

[sudo]
disabled = false
symbol = "󰀶"
style = "bold yellow"
format = "[$symbol SUDO]($style) "

[status]
disabled = false
symbol = "✘ "
success_symbol = ""
format = "[$symbol$status]($style) "
style = "bold red"
pipestatus = true

[jobs]
symbol = "󰜎 "
number_threshold = 1
format = " [$symbol$number](overlay1)"

[shlvl]
disabled = false
symbol = "󰜿 "
style = "bold yellow"
format = "[$symbol]($style)"
threshold = 2

# ===== Shell indicator =====
[shell]
disabled = false
style = "bold"
bash_indicator = "[󱆃 bsh](#a593e0)"
zsh_indicator  = "[󱆃 zsh](#fff1b9)"
fish_indicator = "󰈺 fish"
powershell_indicator = "[󰰓 psh](#f7aa97)"
cmd_indicator  = "[ cmd](#a3daff)"

# ===== Palette (Catppuccin Mocha) =====
